name: Dispatch -Event to Another Repository

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v3

    - name: Trigger workflow in another repository
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.SECRET_TOKEN }} # Or use a PAT with the necessary permissions
        repository: hanzla-spec/cicd
        event-type: build-and-deploy-cicd
        client-payload: '{"ref": "refs/heads/poc", "inputs":{"branch": "${{ github.ref }}", "commit": "${{ github.sha }}", "author": "hanzla"}}'
