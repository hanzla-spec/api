name: Trigger Repo2 Workflow

on:
  push:
    branches:
      - main  # or your preferred branch

jobs:
  trigger_repo2:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow in Repo2 via GitHub API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/hanzla-spec/cicd/actions/workflows/build-and-deploy.yml/dispatches \
            -d '{"ref":"poc", "inputs":{"branch": "${{ github.ref }}", "commit": "${{ github.sha }}"} }'
