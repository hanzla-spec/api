# .github/workflows/trigger-repo2.yml

name: Trigger Repo2 Workflow

on:
  push:
    branches:
      - main  # Adjust this to the branch you want to trigger the workflow on

jobs:
  trigger-repo2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout api
        uses: actions/checkout@v3

      - name: Checkout cicd
        uses: actions/checkout@v3
        with:
          repository: hanzla-spec/cicd
          path: cicd_path
      - name: check ls
        run: ls
      - name: Run script from cicd repo
        run: |
          cd cicd_path  # Change directory to where repo2 was checked out
          chmod +x start.sh  # Make the script executable
          ./start.sh  # Run the script
